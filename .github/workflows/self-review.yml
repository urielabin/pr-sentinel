name: Self Review (dogfood)

# Runs PR Sentinel on its own pull requests, using the local action (uses: ./).
# The action itself no-ops with no cost if ANTHROPIC_API_KEY isn't set on this repo yet.

on:
  pull_request:

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
